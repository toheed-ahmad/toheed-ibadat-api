<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg">

    <!-- =============== REFINED TOP SECTION =============== -->
    <!-- Royal Gold Cap (Fixed Position) -->
    <rect x="960" y="400" width="128" height="80"
        rx="35"
        fill="#FFD700"
        stroke="#C9A000"
        stroke-width="12"/>

    <!-- Decorative Ring on Cap -->
    <ellipse cx="1024" cy="435" rx="55" ry="20"
        fill="none"
        stroke="#FFD700"
        stroke-width="6"
        stroke-dasharray="8 6"/>

    <!-- Main Jewel Bead (Hanging from Cap) -->
    <circle cx="1024" cy="530" r="140"
        fill="#FFD700"
        stroke="#C9A000"
        stroke-width="18"/>

    <!-- Inner Emerald Detail on Bead -->
    <circle cx="1024" cy="530" r="90"
        fill="#00A86B"
        stroke="#FFD700"
        stroke-width="10"
        opacity="0.9"/>

    <!-- Small Gold Stud on Bead -->
    <circle cx="1024" cy="530" r="25"
        fill="#FFD700"
        stroke="#FFF5CC"
        stroke-width="4"/>

    <!-- Connecting Loop (Between Cap and Bead) -->
    <rect x="1014" y="470" width="20" height="70"
        fill="#C9A000"
        rx="10"/>

    <!-- =============== SILK THREADS (NOW START FROM BEAD BOTTOM) =============== -->
    <g stroke="#00A86B" stroke-width="6" stroke-linecap="round">

        <path d="M1024 600 C1000 750 950 1100 970 1500"/>
        <path d="M1024 600 C1020 750 1024 1100 1024 1500"/>
        <path d="M1024 600 C1050 750 1100 1100 1080 1500"/>
        <path d="M1024 600 C990 800 920 1150 940 1500"/>
        <path d="M1024 600 C1060 800 1130 1150 1110 1500"/>
        <path d="M1024 600 C970 850 880 1200 900 1500"/>
        <path d="M1024 600 C1080 850 1170 1200 1150 1500"/>

    </g>

    <!-- Bottom Silk Knot -->
    <ellipse cx="1024" cy="1550" rx="80" ry="45"
        fill="#00A86B"
        stroke="#C9A000"
        stroke-width="10"/>

    <!-- Small Gold Ring on Knot -->
    <ellipse cx="1024" cy="1540" rx="40" ry="20"
        fill="none"
        stroke="#FFD700"
        stroke-width="4"/>

    <!-- =============== BEAD LOOP (ELEGANT ARC) =============== -->
    <g stroke="#C9A000" stroke-width="10">

        <circle cx="1024" cy="900" r="75" fill="#00A86B"/>
        <circle cx="1180" cy="930" r="75" fill="#FFD700"/>
        <circle cx="1320" cy="1010" r="75" fill="#00A86B"/>
        <circle cx="1440" cy="1130" r="75" fill="#FFD700"/>
        <circle cx="1530" cy="1280" r="75" fill="#00A86B"/>
        <circle cx="1580" cy="1450" r="75" fill="#FFD700"/>
        <circle cx="1530" cy="1620" r="75" fill="#00A86B"/>
        <circle cx="1440" cy="1770" r="75" fill="#FFD700"/>
        <circle cx="1320" cy="1890" r="75" fill="#00A86B"/>
        <circle cx="1180" cy="1970" r="75" fill="#FFD700"/>
        <circle cx="1024" cy="2000" r="75" fill="#00A86B"/>
        <circle cx="868" cy="1970" r="75" fill="#FFD700"/>
        <circle cx="728" cy="1890" r="75" fill="#00A86B"/>
        <circle cx="608" cy="1770" r="75" fill="#FFD700"/>
        <circle cx="518" cy="1620" r="75" fill="#00A86B"/>
        <circle cx="468" cy="1450" r="75" fill="#FFD700"/>
        <circle cx="518" cy="1280" r="75" fill="#00A86B"/>
        <circle cx="608" cy="1130" r="75" fill="#FFD700"/>
        <circle cx="728" cy="1010" r="75" fill="#00A86B"/>
        <circle cx="868" cy="930" r="75" fill="#FFD700"/>

    </g>

    <!-- Extra Gold Dots for Embellishment (Optional) -->
    <circle cx="1024" cy="230" r="20" fill="#FFD700" opacity="0.7"/>
    <circle cx="1100" cy="270" r="15" fill="#FFD700" opacity="0.5"/>

</svg>